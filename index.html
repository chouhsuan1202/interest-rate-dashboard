<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>全球利率</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="page-header">
      <div class="header-copy">
        <h1>全球利率</h1>
        <span class="inline-status" id="statusBar">讀取中</span>
      </div>
      <button id="refreshButton" type="button">更新</button>
    </header>

    <main>
      <section class="primary-overview" aria-labelledby="primaryHeading">
        <div class="section-heading compact">
          <h2 id="primaryHeading">重點地區</h2>
        </div>
        <div class="primary-card-grid" id="primaryCards"></div>
      </section>

      <section class="asia-summary-section" aria-labelledby="europeHeading">
        <div class="section-heading compact">
          <h2 id="europeHeading">歐洲其他</h2>
        </div>
        <div class="asia-summary-list europe-list" id="europeSummary"></div>
      </section>

      <section class="asia-summary-section" aria-labelledby="asiaHeading">
        <div class="section-heading compact">
          <h2 id="asiaHeading">亞洲其他</h2>
        </div>
        <div class="asia-summary-list" id="asiaSummary"></div>
      </section>

      <section>
        <div class="section-heading compact">
          <h2>政策利率趨勢</h2>
        </div>
        <div id="trendChart" class="chart" aria-label="政策利率趨勢圖"></div>
      </section>

      <section>
        <div class="section-heading compact">
          <h2>明細</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>地區</th>
                <th>政策利率</th>
                <th>房貸</th>
                <th>信貸</th>
                <th>股票質押 / 融資</th>
              </tr>
            </thead>
            <tbody id="primaryRows"></tbody>
          </table>
        </div>
      </section>

      <section>
        <div class="section-heading compact">
          <h2>亞洲明細</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>地區</th>
                <th>政策利率</th>
                <th>房貸</th>
                <th>信貸</th>
                <th>股票質押 / 融資</th>
              </tr>
            </thead>
            <tbody id="asiaRows"></tbody>
          </table>
        </div>
      </section>

      <footer class="page-footer">
        <p class="quality-note">
          資料狀態：官方 = 央行或監管機構來源；市場 = 比較網站或公開市場報價；券商 = 融資或 margin 費率表；手動 = 人工維護區間與來源連結；無資料 = 尚無可靠公開數值。
        </p>
        <p class="credit">Created by Hsuan × her AI bestie</p>
      </footer>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
